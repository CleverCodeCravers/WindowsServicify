name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_DIR: "WindowsServicify"
  PROJECT: "./WindowsServicify.ConsoleApp/WindowsServicify.ConsoleApp.csproj"
  RELEASEPREFIX: "WindowsServicify"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Prepare — Semver-Berechnung
  # Wird nur bei workflow_dispatch ausgefuehrt
  # ──────────────────────────────────────────────
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next semver version
        id: semver
        shell: bash
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "Latest tag: $LATEST_TAG"

          OUTPUT=$(bash Scripts/calculate-next-version.sh "$LATEST_TAG" "${{ github.event.inputs.bump }}")
          NEW_VERSION=$(echo "$OUTPUT" | head -1)
          NEW_TAG=$(echo "$OUTPUT" | tail -1)

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Job 2: Build and Release
  # Bei push: nur Build + Test + Coverage
  # Bei workflow_dispatch: Build + Test + Tag + Release
  # ──────────────────────────────────────────────
  build-and-release:
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: windows-latest

    env:
      RUNTIMEID: win-x64
      OUTPUTDIR: servicify-win-x64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: dotnet restore
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --settings WindowsServicify.Domain.Tests/coverlet.runsettings
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Source/${{ env.SOLUTION_DIR }}/**/coverage.cobertura.xml

      - name: Publish
        if: steps.version.outputs.is_release == 'true'
        run: dotnet publish ${{ env.PROJECT }} -c Release -o ${{ env.OUTPUTDIR }} -p:PublishReadyToRun=true --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:UseAppHost=true -r ${{ env.RUNTIMEID }} -p:Version=${{ steps.version.outputs.version }}
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Delete PDB files
        if: steps.version.outputs.is_release == 'true'
        working-directory: ./Source/${{ env.SOLUTION_DIR }}/${{ env.OUTPUTDIR }}/
        run: Remove-Item -Path '*.pdb' -Force -Recurse
        shell: pwsh

      - name: Create ZIP archive
        if: steps.version.outputs.is_release == 'true'
        uses: vimtor/action-zip@v1
        with:
          files: ./Source/${{ env.SOLUTION_DIR }}/${{ env.OUTPUTDIR }}/
          dest: ${{ env.SOLUTION_DIR }}/${{ env.OUTPUTDIR }}.zip

      - name: Create Git tag
        if: steps.version.outputs.is_release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.tag }}" -m "Release ${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.SOLUTION_DIR }}/${{ env.OUTPUTDIR }}.zip
